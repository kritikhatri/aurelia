version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: aurelia_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aurelia_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: aurelia_server
    ports:
      - "5500:5500"
    environment:
      - PORT=5500
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/aurelia
      - JWT_ACCESS_SECRET=aurelia_access_secret_key_12345
      - JWT_REFRESH_SECRET=aurelia_refresh_secret_key_67890
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=30d
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo
    networks:
      - aurelia_network
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: aurelia_client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5500/api
    depends_on:
      - server
    networks:
      - aurelia_network
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  mongo_data:

networks:
  aurelia_network:
    driver: bridge
