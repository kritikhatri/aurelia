name: Aurelia CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            client/package.json
            server/package.json

      - name: Install and Build Backend
        run: |
          cd server
          npm install
          npm run build --if-present

      - name: Install and Build Frontend
        run: |
          cd client
          npm install
          npm run build
